spring:
  main:
    allow-circular-references: true
  flyway:
    enabled: false
    baselineOnMigrate: true
    check-location: false
  datasource:
    # Persistent H2 file DB. The /data dir is bind-mounted from ./data on the host.
    # Switch to Postgres by replacing this whole block; see the commented sample below.
    url: 'jdbc:h2:file:/data/h2;DB_CLOSE_DELAY=-1'
    username: sa
    password: ''
    driverClassName: org.h2.Driver
    max-active: 15
  jpa:
    properties:
      hibernate.format_sql: false
      hibernate.show_sql: false
      hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirH2Dialect
      hibernate.search.enabled: false

server:
  # Internal container port. The host port (8090 by default) is set in docker-compose.yml.
  port: 8080
  servlet:
    context-path: /

hapi:
  fhir:
    fhir_version: R4
    server_name: HAPI Sandbox
    # server_address is intentionally NOT hardcoded here. HAPI now runs behind a
    # Caddy reverse proxy that terminates TLS (see docker-compose.yml + Caddyfile),
    # so the public base URL is injected at runtime via the HAPI_FHIR_SERVER_ADDRESS
    # env var (= https://${DOMAIN}/fhir, from .env) — Spring relaxed-binding maps it
    # onto this property. This keeps CapabilityStatement / paging links / Location
    # headers pointing at the public HTTPS base. Don't set it here, or you'd pin a
    # value that diverges from .env. (The bind-mounted YAML is NOT ${...}-interpolated
    # by docker-compose, which is why this is driven by an env var instead.)

    allow_multiple_delete: true
    allow_external_references: true
    expunge_enabled: true
    reuse_cached_search_results_millis: -1
    # false: install only the IGs listed below, not their transitive dependencies.
    # et.fhir.core declares 8 deps (hl7.terminology, uv.*, smart.who.int.base); we
    # don't want HAPI fetching all of them from the registry on every boot.
    # ETPatient validation needs only ETPatient + its local CodeSystems/ValueSets
    # (all inside et.fhir.core) plus base R4. Add specific deps here if a profile
    # we validate actually requires them.
    install_transitive_ig_dependencies: false
    openapi_enabled: true
    ig_runtime_upload_enabled: true
    # The ZW IGs are ci-builds whose resources are still status=draft; without this,
    # the package installer skips every non-active resource.
    validate_resource_status_for_package_upload: false

    # Validate incoming writes so non-conformant payloads are rejected with an
    # OperationOutcome (the Lab Order/Result Repository actor obligation in the
    # ZW Lab IG).
    validation:
      requests_enabled: true
      responses_enabled: false

    cors:
      allow_Credentials: true
      # CORS only affects browsers (not curl / server-to-server callers), so it is
      # not needed for iteration-1 testing. A browser UI served from the public
      # origin will need "https://<your-domain>" added below (or set via the
      # HAPI_FHIR_CORS_ALLOWED_ORIGIN_PATTERNS env var so it follows ${DOMAIN}).
      # Keep allow_Credentials with explicit patterns — do not use "*".
      allowed_origin_patterns:
        - "http://localhost:*"
        - "https://sandbox.fhir.et"
        - "https://*.fhir.et"

    cr:
      enabled: true

    implementationguides:
      fhir_r4_core:
        name: hl7.fhir.r4.core
        version: 4.0.1
        packageUrl: http://hl7.org/fhir/R4/hl7.fhir.r4.core.tgz
      # Ethiopia base IG. Defaults to the published DEV BUILD on GitHub Pages, so
      # the sandbox targets the same package everything else references. Source is
      # env-switchable via these ${VAR:default} placeholders (Spring resolves them):
      #   DEFAULT:  https://moh-ethiopia.github.io/ETBase/package.tgz  (dev build)
      #   OFFLINE:  set ET_IG_PACKAGE_URL=file:///igs/et.fhir.core.tgz + ET_IG_VERSION=dev
      #             and build the tgz via harness/scripts/refresh-core-ig.sh
      et_core:
        name: et.fhir.core
        version: ${ET_IG_VERSION:0.9.0}
        packageUrl: ${ET_IG_PACKAGE_URL:https://moh-ethiopia.github.io/ETBase/package.tgz}
        installMode: STORE_AND_INSTALL
      # Derived demo IGs from the core's disabled (.fshNO) content: surveillance
      # (extensions) and HIV (HIVPatient w/ required ART number, hiv-encounter,
      # hiv-medication-dispense). HIV depends on surveillance, surveillance on core.
      # Default to the published dev builds (GitHub Pages); override to a local
      # file:///igs/*.tgz build via .env (ET_SURVEILLANCE_PKG_URL / ET_HIV_PKG_URL).
      et_surveillance:
        name: et.fhir.surveillance
        version: ${ET_SURVEILLANCE_VERSION:0.1.0}
        packageUrl: ${ET_SURVEILLANCE_PKG_URL:https://pmanko.github.io/et.fhir.surveillance/package.tgz}
        installMode: STORE_AND_INSTALL
      et_hiv:
        name: et.fhir.hiv
        version: ${ET_HIV_VERSION:0.1.0}
        packageUrl: ${ET_HIV_PKG_URL:https://pmanko.github.io/et.fhir.hiv/package.tgz}
        installMode: STORE_AND_INSTALL


    # custom_content_path / app_content_path are intentionally NOT set.
    # The current hapiproject/hapi:latest image has a bug: CustomContentFilesConfigurer
    # strips the trailing slash from the path, and the newer Spring Boot then rejects
    # the resulting resource location ("Resource location does not end with slash").
    # Workaround if you need them: use a double trailing slash, e.g.
    #   custom_content_path: /custom//
    #   app_content_path: /apps//
    # and mount the corresponding host folders into /custom and /apps in docker-compose.yml.

