# Host nginx for sandbox.fhir.et: terminate TLS, forward everything to the
# sandbox gateway (127.0.0.1:8095, set via GATEWAY_PORT). The gateway owns all
# routing (/fhir, /intercept, /docs, /sim), so there is nothing per-route here.
#
#   sudo cp deploy/nginx/sandbox.fhir.et.conf /etc/nginx/sites-available/sandbox.fhir.et
#   sudo ln -sf /etc/nginx/sites-available/sandbox.fhir.et /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d sandbox.fhir.et   # once, for the cert

server {
    server_name sandbox.fhir.et;

    location / {
        proxy_pass         http://127.0.0.1:8095;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/sandbox.fhir.et/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sandbox.fhir.et/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = sandbox.fhir.et) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name sandbox.fhir.et;
    return 404; # managed by Certbot
}
