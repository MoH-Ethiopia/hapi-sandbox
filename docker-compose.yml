services:
  fhir-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: hapi-sandbox-fhir:local
    container_name: hapi-sandbox
    restart: unless-stopped
    # Local-only direct HAPI access (debugging). Public traffic goes via gateway.
    ports:
      - "127.0.0.1:${HAPI_DEBUG_PORT:-8090}:8080"
    env_file:
      - .env
    environment:
      - SPRING_CONFIG_LOCATION=file:/config/application.yaml
      - HAPI_FHIR_SERVER_ADDRESS=${PUBLIC_BASE_URL:-https://${DOMAIN}/fhir}
    volumes:
      - ./config/application.yaml:/config/application.yaml:ro
      - ./data:/data
      - ./igs:/igs:ro
    healthcheck:
      test: ["CMD", "/busybox/busybox", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/fhir/metadata"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  interceptor:
    build:
      context: ./harness/interceptor
    image: hapi-sandbox-interceptor:local
    container_name: hapi-interceptor
    restart: unless-stopped
    environment:
      - ET_TARGET=http://fhir-server:8080/fhir
    volumes:
      - ./harness/interceptor/et-interceptor.feature:/app/et-interceptor.feature:ro
      - ./harness/interceptor/profileFor.json:/app/profileFor.json:ro
      - ./harness/target/sessions:/sessions
    depends_on:
      fhir-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  gateway:
    # Single entrypoint (HTTP) — routes /fhir, /intercept, /docs, /sim. Bound to
    # 127.0.0.1: front it with the host's TLS-terminating reverse proxy in
    # production, or hit it directly at http://localhost:${GATEWAY_PORT} in dev.
    image: caddy:2-alpine
    container_name: hapi-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-8095}:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docs:/srv/docs:ro
      - ./harness/simulator:/srv/sim:ro
    depends_on:
      fhir-server:
        condition: service_healthy
      interceptor:
        condition: service_started
